name: ci-registraduria

on:
  workflow_dispatch:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]

jobs:
  unit-tests:
    name: Unit & Integration Tests (Vitest)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: registraduria-ts
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: registraduria-ts/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run tests
        run: npm test
      - name: Coverage report
        run: npm run test:coverage

  k6-perf:
    name: Performance Tests (k6)
    runs-on: ubuntu-latest
    needs: unit-tests
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install app dependencies
        working-directory: registraduria-ts
        run: npm ci

      - name: Install k6
        run: |
          sudo apt-get update -y
          sudo apt-get install -y gnupg2 ca-certificates
          curl -s https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" \
            | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update -y
          sudo apt-get install -y k6

      - name: Start API (background)
        working-directory: registraduria-ts
        run: |
          npx tsx src/index.ts &
          sleep 3
          curl --fail http://localhost:8080/register \
            -X POST -H "Content-Type: application/json" \
            -d '{"name":"smoke","id":1,"age":30,"gender":"MALE","alive":true}' \
            || (echo "API did not start" && exit 1)

      - name: Baseline – POST /register
        run: |
          k6 run perf/scripts/register_person_k6.js \
            --env SCENARIO=baseline \
            --env BASE_URL=http://localhost:8080 \
            -o json=perf/results/baseline.json

      - name: Load – POST /register
        run: |
          k6 run perf/scripts/register_person_k6.js \
            --env SCENARIO=load \
            --env BASE_URL=http://localhost:8080 \
            -o json=perf/results/load.json

      - name: Stress – POST /register
        run: |
          k6 run perf/scripts/register_person_k6.js \
            --env SCENARIO=stress \
            --env BASE_URL=http://localhost:8080 \
            -o json=perf/results/stress.json

      - name: Baseline – POST /api/v1/voters/register
        run: |
          k6 run perf/scripts/register_voter_k6.js \
            --env SCENARIO=baseline \
            --env BASE_URL=http://localhost:8080 \
            -o json=perf/results/voters-baseline.json

      - name: Upload perf artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-results
          path: perf/results/**
